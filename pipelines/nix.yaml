steps:
- task: CmdLine@2
  displayName: 'Bootstrap vcpkg'
  inputs:
    script: |
      cd $(Build.SourcesDirectory)
      git clone https://github.com/microsoft/vcpkg.git
      cd vcpkg
      git checkout 2026.01.16
      ./bootstrap-vcpkg.sh -disableMetrics
    workingDirectory: '$(Build.SourcesDirectory)'
    failOnStderr: false

- task: CMake@1
  displayName: 'Configure cppvrf'
  inputs:
    cmakeArgs: >
      -S .
      -B build
      -GNinja
      -DCMAKE_BUILD_TYPE='${{ parameters.configuration }}'
      -DCPPVRF_BUILD_TESTS=ON
      -DCPPVRF_BUILD_BENCHMARKS=ON
      -DCMAKE_TOOLCHAIN_FILE=$(Build.SourcesDirectory)/vcpkg/scripts/buildsystems/vcpkg.cmake
    workingDirectory: '$(Build.SourcesDirectory)'

- task: CMake@1
  displayName: 'Build cppvrf'
  inputs:
    cmakeArgs: >
      --build build
      --config '${{ parameters.configuration }}'
    workingDirectory: '$(Build.SourcesDirectory)'

- task: CmdLine@2
  displayName: 'Run cppvrf unit tests'
  inputs:
    script: 'build/bin/vrf_tests'
    workingDirectory: '$(Build.SourcesDirectory)'
